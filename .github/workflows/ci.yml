name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:
  workflow_dispatch:

jobs:
  test-and-evaluate:
    name: Test and eval gates
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run product tests
        run: python -m pytest

      - name: Regenerate labeled eval dataset
        run: PYTHONPATH=. python -m evals.generate_dataset

      - name: Verify generated eval dataset is committed
        run: git diff --exit-code -- evals/datasets/ho3_labeled.jsonl

      # NOTE: this is a deterministic CONTRACT / REGRESSION gate, not a model-quality
      # gate. Decision accuracy, reason-code match, and faithfulness are 100% *by
      # construction* (labels derive from the same ruleset), so this proves the
      # implementation still matches its spec — it does not measure AI quality.
      # Model quality is measured out-of-band by evals/judge_calibration.py and the
      # retrieval recall numbers in docs/retrieval_eval.md (not gated here because
      # they need real model/keys and would break CI hermeticity).
      - name: Run labeled underwriting eval gate (deterministic contract check)
        run: >-
          PYTHONPATH=. python -m evals.run
          --dataset evals/datasets/ho3_labeled.jsonl
          --json
          --min-decision-accuracy 1.0
          --min-reason-code-match 1.0
          --min-retrieval-recall 1.0
          --min-faithfulness 1.0

      - name: Smoke test retrieval comparison CLI
        run: >-
          python scripts/compare_retrieval.py
          --query "high wildfire risk roof age referral"
          --limit 3

      - name: Smoke test chunking comparison CLI
        run: python scripts/compare_chunking.py --k 3
