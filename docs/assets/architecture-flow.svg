<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="820" viewBox="0 0 1400 820" role="img" aria-labelledby="title desc">
  <title id="title">Agentic Underwriter Architecture Flow</title>
  <desc id="desc">A governed underwriting workflow from HO3 submission through intake, enrichment, retrieval, deterministic rules, verification, rating, decision packet, and human review.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#eef6f3"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-20%" width="120%" height="150%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#0f172a" flood-opacity="0.12"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto" markerUnits="strokeWidth">
      <path d="M2,2 L10,6 L2,10 Z" fill="#475569"/>
    </marker>
    <style>
      .title { font: 700 34px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 400 18px Arial, sans-serif; fill: #475569; }
      .label { font: 700 20px Arial, sans-serif; fill: #0f172a; }
      .small { font: 400 15px Arial, sans-serif; fill: #475569; }
      .pill { font: 700 13px Arial, sans-serif; letter-spacing: 0.4px; fill: #0f766e; }
      .box { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.5; rx: 14; filter: url(#shadow); }
      .decision { fill: #fff7ed; stroke: #fed7aa; stroke-width: 1.5; filter: url(#shadow); }
      .rules { fill: #ecfdf5; stroke: #99f6e4; stroke-width: 1.5; rx: 14; filter: url(#shadow); }
      .human { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.5; rx: 14; filter: url(#shadow); }
      .line { stroke: #475569; stroke-width: 2.4; fill: none; marker-end: url(#arrow); }
      .mutedline { stroke: #94a3b8; stroke-width: 2; stroke-dasharray: 7 7; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>

  <rect width="1400" height="820" fill="url(#bg)"/>

  <text x="70" y="72" class="title">Agentic Underwriter: Governed AI Workflow</text>
  <text x="70" y="106" class="subtitle">LLM at the edges for wording. Deterministic rules at the center for eligibility.</text>

  <rect x="70" y="165" width="230" height="92" class="box"/>
  <text x="95" y="204" class="pill">INPUT</text>
  <text x="95" y="232" class="label">HO3 Submission</text>

  <rect x="360" y="165" width="245" height="92" class="box"/>
  <text x="385" y="204" class="pill">STEP 1</text>
  <text x="385" y="232" class="label">Intake Normalizer</text>

  <polygon points="690,155 805,211 690,267 575,211" class="decision"/>
  <text x="636" y="206" class="label">Missing</text>
  <text x="658" y="232" class="label">Facts?</text>

  <rect x="880" y="135" width="250" height="92" class="box"/>
  <text x="905" y="174" class="pill">PAUSE</text>
  <text x="905" y="202" class="label">Follow-up Questions</text>

  <rect x="880" y="270" width="250" height="92" class="box"/>
  <text x="905" y="309" class="pill">RESUME</text>
  <text x="905" y="337" class="label">Same Run ID</text>

  <rect x="70" y="430" width="210" height="92" class="box"/>
  <text x="95" y="469" class="pill">STEP 2</text>
  <text x="95" y="497" class="label">Planner / Router</text>

  <rect x="330" y="430" width="210" height="92" class="box"/>
  <text x="355" y="469" class="pill">STEP 3</text>
  <text x="355" y="497" class="label">Risk Enrichment</text>

  <rect x="590" y="430" width="210" height="92" class="box"/>
  <text x="615" y="469" class="pill">STEP 4</text>
  <text x="615" y="497" class="label">Guideline RAG</text>

  <rect x="850" y="430" width="240" height="92" class="rules"/>
  <text x="875" y="469" class="pill">DECISION CORE</text>
  <text x="875" y="497" class="label">Deterministic Rules</text>

  <rect x="1140" y="430" width="210" height="92" class="box"/>
  <text x="1165" y="469" class="pill">GUARDRAIL</text>
  <text x="1165" y="497" class="label">Verifier</text>

  <rect x="260" y="620" width="210" height="92" class="box"/>
  <text x="285" y="659" class="pill">STEP 7</text>
  <text x="285" y="687" class="label">Rating</text>

  <rect x="530" y="620" width="250" height="92" class="box"/>
  <text x="555" y="659" class="pill">OUTPUT</text>
  <text x="555" y="687" class="label">Decision Packet</text>

  <polygon points="875,604 1000,666 875,728 750,666" class="decision"/>
  <text x="827" y="661" class="label">Review</text>
  <text x="828" y="687" class="label">Needed?</text>

  <rect x="1060" y="620" width="240" height="92" class="human"/>
  <text x="1085" y="659" class="pill">HITL</text>
  <text x="1085" y="687" class="label">Human Review Queue</text>

  <line x1="300" y1="211" x2="360" y2="211" class="line"/>
  <line x1="605" y1="211" x2="575" y2="211" class="line"/>
  <line x1="805" y1="211" x2="880" y2="181" class="line"/>
  <line x1="1005" y1="227" x2="1005" y2="270" class="line"/>
  <path d="M880 316 C700 355, 510 330, 482 257" class="mutedline"/>
  <path d="M690 267 C610 350, 260 340, 175 430" class="line"/>
  <line x1="280" y1="476" x2="330" y2="476" class="line"/>
  <line x1="540" y1="476" x2="590" y2="476" class="line"/>
  <line x1="800" y1="476" x2="850" y2="476" class="line"/>
  <line x1="1090" y1="476" x2="1140" y2="476" class="line"/>
  <path d="M1245 522 C1190 610, 530 565, 365 620" class="line"/>
  <line x1="470" y1="666" x2="530" y2="666" class="line"/>
  <line x1="780" y1="666" x2="750" y2="666" class="line"/>
  <line x1="1000" y1="666" x2="1060" y2="666" class="line"/>

  <text x="828" y="197" class="small">yes</text>
  <text x="555" y="310" class="small">no</text>
  <text x="1018" y="651" class="small">yes</text>
  <text x="705" y="646" class="small">no</text>
  <text x="555" y="728" class="small">ACCEPT completes; REFER / DECLINE routes to review with citations and reason codes.</text>
</svg>
